name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  publish-npm:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: bun run build

      - name: Check if version changed
        id: version
        run: |
          CURRENT=$(bun -e "const pkg = await Bun.file('package.json').json(); console.log(pkg.version)")
          PUBLISHED=$(npm show agent-thread version 2>/dev/null || echo "0.0.0")
          echo "current=$CURRENT"
          echo "published=$PUBLISHED"
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          if [ "$CURRENT" != "$PUBLISHED" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        if: steps.version.outputs.changed == 'true'
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build CLI release notes
        if: steps.version.outputs.changed == 'true'
        run: |
          set -euo pipefail

          PREVIOUS_PUBLISHED_AT=$(gh release list \
            --exclude-drafts \
            --exclude-pre-releases \
            --limit 1 \
            --json publishedAt \
            --jq '.[0].publishedAt // ""')

          echo "previous_published_at=$PREVIOUS_PUBLISHED_AT"

          if [ -n "$PREVIOUS_PUBLISHED_AT" ]; then
            SEARCH_DATE="${PREVIOUS_PUBLISHED_AT%%T*}"
            gh pr list \
              --state merged \
              --base main \
              --label cli \
              --search "merged:>$SEARCH_DATE" \
              --limit 200 \
              --json number,title,url,mergedAt > cli-prs.json
          else
            gh pr list \
              --state merged \
              --base main \
              --label cli \
              --limit 200 \
              --json number,title,url,mergedAt > cli-prs.json
          fi

          cat > build-release-notes.ts <<'EOF'
          const since = process.env.PREVIOUS_PUBLISHED_AT ?? "";
          const prs = (await Bun.file("cli-prs.json").json())
            .filter((pr: { mergedAt: string }) => !since || pr.mergedAt > since)
            .sort((left: { mergedAt: string }, right: { mergedAt: string }) => left.mergedAt.localeCompare(right.mergedAt));

          const lines = ["## CLI changes", ""];
          if (prs.length === 0) {
            lines.push("No CLI-labeled pull requests were found for this release.");
          } else {
            lines.push(...prs.map((pr: { title: string; number: number; url: string }) => `- ${pr.title} ([#${pr.number}](${pr.url}))`));
          }

          await Bun.write("release-notes.md", `${lines.join("\n")}\n`);
          EOF

          PREVIOUS_PUBLISHED_AT="$PREVIOUS_PUBLISHED_AT" bun build-release-notes.ts
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        run: |
          gh release create "v${{ steps.version.outputs.current }}" \
            --title "v${{ steps.version.outputs.current }}" \
            --notes-file release-notes.md \
            --target "${{ github.sha }}"
        env:
          GH_TOKEN: ${{ github.token }}
