name = "agent-thread"
main = "src/worker/index.ts"
compatibility_date = "2026-03-27"

[[d1_databases]]
binding = "DB"
database_name = "agent-thread"
database_id = "564bb1ee-d00d-48b0-a35b-cae425ccc0e4"

[[r2_buckets]]
binding = "SESSIONS_BUCKET"
bucket_name = "agent-thread-sessions-amalshaji"

[[routes]]
pattern = "agent-thread.com"
zone_name = "agent-thread.com"
custom_domain = true

[vars]
PUBLIC_BASE_URL = "https://agent-thread.com"
AGENT_THREAD_SERVER_URL = "https://agent-thread.com"
